<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projecteur — Quiz En place mon Loup</title>
<script src="firebase-config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp(FIREBASE_CONFIG);
const db  = getDatabase(app);

let questions    = {};
let session      = {};
let participants = {};
let timerInterval = null;

onValue(ref(db, "questions"), snap => { questions = snap.val() || {}; });
onValue(ref(db, "participants"), snap => { participants = snap.val() || {}; updateAnswerCount(); });
onValue(ref(db, "session"), snap => { session = snap.val() || {}; render(); });

// ── Render dispatcher ─────────────────────────────────────────────────────
function render() {
  clearInterval(timerInterval);
  ["view-idle","view-waiting","view-question","view-results","view-leaderboard","view-finished"]
    .forEach(v => document.getElementById(v).style.display = "none");

  switch(session.status) {
    case "waiting":     showWaiting();         break;
    case "question":    showQuestion();        break;
    case "results":     showResults();         break;
    case "leaderboard": showLeaderboard(false); break;
    case "finished":    showLeaderboard(true);  break;
    default:            document.getElementById("view-idle").style.display = "flex";
  }
}

// ── Waiting ───────────────────────────────────────────────────────────────
function showWaiting() {
  const v = document.getElementById("view-waiting");
  v.style.display = "flex";
  if (!document.getElementById("qr-code").innerHTML) {
    new QRCode(document.getElementById("qr-code"), {
      text: APP_URL, width: 260, height: 260,
      colorDark: "#2d6a4f", colorLight: "#f8f5f0",
      correctLevel: QRCode.CorrectLevel.M
    });
  }
  document.getElementById("join-url").textContent = APP_URL;
  document.getElementById("waiting-count").textContent = Object.keys(participants).length;
}

// ── Question ──────────────────────────────────────────────────────────────
function showQuestion() {
  const q = questions[session.currentQuestion];
  if (!q) return;

  const v = document.getElementById("view-question");
  v.style.display = "flex";

  // Question image
  const qImgWrap = document.getElementById("q-image-wrap");
  const qImgEl   = document.getElementById("q-image");
  if (q.questionImage) {
    qImgEl.src = q.questionImage;
    qImgWrap.style.display = "flex";
  } else {
    qImgWrap.style.display = "none";
  }

  document.getElementById("q-text").textContent = q.question;

  // Detect if any option has an image → switch to image layout
  const hasOptImgs = q.optionImages && q.optionImages.some(u => u);
  const grid = document.getElementById("q-options-grid");
  grid.className = "q-options-grid" + (hasOptImgs ? " has-images" : "");

  const colors = ["#e63946","#457b9d","#e9c46a","#2d6a4f"];
  const icons  = ["🔺","🔷","🟡","🟢"];
  const optEls = document.querySelectorAll(".q-option");

  q.options.forEach((opt, i) => {
    const el     = optEls[i];
    const imgEl  = el.querySelector(".opt-img");
    const imgUrl = q.optionImages?.[i];

    el.style.background = colors[i];
    el.querySelector(".opt-icon").textContent = icons[i];
    el.querySelector(".opt-text").textContent = opt;

    if (imgUrl) {
      imgEl.src = imgUrl;
      imgEl.style.display = "block";
    } else {
      imgEl.src = "";
      imgEl.style.display = "none";
    }
  });

  // Timer
  const elapsed  = (Date.now() - session.questionStartedAt) / 1000;
  let remaining  = Math.max(0, q.timer - elapsed);
  const timerEl  = document.getElementById("q-timer");
  const timerBar = document.getElementById("q-timer-bar");

  function tick() {
    const r = Math.max(0, remaining);
    timerEl.textContent  = Math.ceil(r);
    timerBar.style.width = (r / q.timer * 100) + "%";
    timerBar.style.background = r > q.timer*.4 ? "#40916c" : r > q.timer*.2 ? "#e9c46a" : "#e63946";
    remaining -= 0.1;
  }
  tick();
  timerInterval = setInterval(tick, 100);

  updateAnswerCount();
}

function updateAnswerCount() {
  if (session.status !== "question") return;
  const el = document.getElementById("q-answer-count");
  if (!el) return;
  const answered = Object.values(participants).filter(p =>
    p.answers && p.answers[session.currentQuestion] !== undefined
  ).length;
  const total = Object.keys(participants).length;
  el.textContent = `${answered} / ${total} réponses`;
}

// ── Results ───────────────────────────────────────────────────────────────
function showResults() {
  const q = questions[session.currentQuestion];
  if (!q) return;
  document.getElementById("view-results").style.display = "flex";
  document.getElementById("res-q-text").textContent = q.question;

  const counts = [0,0,0,0];
  let total = 0;
  Object.values(participants).forEach(p => {
    const a = p.answers?.[session.currentQuestion];
    if (a !== undefined && a.answer !== undefined) { counts[a.answer]++; total++; }
  });

  const colors = ["#e63946","#457b9d","#e9c46a","#2d6a4f"];
  const icons  = ["🔺","🔷","🟡","🟢"];
  document.querySelectorAll(".res-bar-wrap").forEach((wrap, i) => {
    const pct = total > 0 ? (counts[i] / total * 100) : 0;
    wrap.querySelector(".res-icon").textContent     = icons[i];
    wrap.querySelector(".res-opt-text").textContent = q.options[i];
    wrap.querySelector(".res-label").textContent    = Math.round(pct) + "%";
    wrap.querySelector(".res-count").textContent    = counts[i];
    const bar = wrap.querySelector(".res-bar");
    bar.style.height     = Math.max(pct, 3) + "%";
    bar.style.background = i === q.correct ? "#40916c" : colors[i] + "bb";
    if (i === q.correct) {
      wrap.querySelector(".res-opt-text").innerHTML += " ✅";
      bar.style.boxShadow = "0 0 0 3px white";
    }
  });
}

// ── Leaderboard ───────────────────────────────────────────────────────────
function showLeaderboard(final) {
  document.getElementById(final ? "view-finished" : "view-leaderboard").style.display = "flex";
  const sorted = Object.entries(participants).sort(([,a],[,b]) => (b.score||0) - (a.score||0));
  const prizes = ["🏅 Hoodie Limoilou en vrac", "🥈 T-shirt Limoilou en vrac", "🥉 Gourde Limoilou en vrac"];
  const podiumOrder = [1, 0, 2]; // visual: 2nd left, 1st center, 3rd right
  const heights     = ["110px","80px","65px"]; // indexed by rank (0=1st, 1=2nd, 2=3rd)

  const podiumEl = document.getElementById(final ? "final-podium" : "interim-podium");
  const listEl   = document.getElementById(final ? "final-list"   : "interim-list");

  podiumEl.innerHTML = podiumOrder.map(i => {
    const entry = sorted[i];
    if (!entry) return `<div class="podium-slot empty"></div>`;
    const [, p] = entry;
    return `
      <div class="podium-slot">
        <div class="podium-name">${p.name}</div>
        <div class="podium-score">${p.score||0} pts</div>
        <div class="podium-base" style="height:${heights[i]}">
          <span class="podium-rank">${i+1}</span>
          ${final && prizes[i] ? `<div class="podium-prize">${prizes[i]}</div>` : ""}
        </div>
      </div>`;
  }).join("");

  listEl.innerHTML = sorted.slice(3,10).map(([,p],i) => `
    <div class="list-row">
      <span class="list-rank">${i+4}</span>
      <span class="list-name">${p.name}</span>
      <span class="list-score">${p.score||0} pts</span>
    </div>`).join("");
}

render();
</script>
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root { --green:#2d6a4f; --green2:#40916c; --gold:#e9c46a; --bg:#1a1a2e; --text:#f8f5f0; }

  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }

  .view { display:none; flex-direction:column; align-items:center; justify-content:center; height:100vh; padding:2.5rem; text-align:center; }

  /* ── IDLE ── */
  #view-idle { background:linear-gradient(135deg,#1a1a2e 0%,#2d6a4f 100%); }
  #view-idle h1 { font-size:3rem; margin-bottom:.5rem; }
  #view-idle p  { font-size:1.5rem; color:var(--gold); }

  /* ── WAITING ── */
  #view-waiting { background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%); gap:1.5rem; }
  #view-waiting h1 { font-size:2.5rem; color:var(--gold); }
  #qr-code { background:#f8f5f0; padding:1rem; border-radius:16px; display:inline-block; }
  #join-url { font-size:1.6rem; font-weight:700; letter-spacing:.05em; }
  .waiting-sub { font-size:1.2rem; color:#aaa; }
  #waiting-count { font-size:1.8rem; font-weight:700; color:var(--green2); }

  /* ── QUESTION ── */
  #view-question {
    background:linear-gradient(135deg,#0f3460 0%,#16213e 100%);
    justify-content:space-between; padding:1.5rem 2.5rem; gap:1rem;
  }

  .q-header { width:100%; display:flex; align-items:center; gap:1rem; flex-shrink:0; }
  #q-timer-wrap { flex:1; height:18px; background:#ffffff22; border-radius:9px; overflow:hidden; }
  #q-timer-bar  { height:100%; border-radius:9px; transition:width .1s linear, background .3s; width:100%; }
  #q-timer      { font-size:2.5rem; font-weight:900; min-width:3rem; text-align:right; }

  /* Question image */
  #q-image-wrap { flex-shrink:0; max-height:32vh; display:flex; justify-content:center; }
  #q-image      { max-height:32vh; max-width:60vw; object-fit:contain; border-radius:12px; box-shadow:0 4px 24px rgba(0,0,0,.4); }

  #q-text {
    font-size:clamp(1.6rem,3.5vw,2.8rem); font-weight:800; line-height:1.2;
    max-width:900px; flex-shrink:0; text-shadow:0 2px 8px rgba(0,0,0,.4);
  }

  /* Options — text only */
  .q-options-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:1rem; width:100%; max-width:1000px; flex-shrink:0;
  }
  .q-option {
    border-radius:14px; padding:1rem 1.5rem;
    display:flex; align-items:center; gap:1rem;
    font-size:clamp(1rem,2.2vw,1.5rem); font-weight:700;
    text-shadow:0 1px 4px rgba(0,0,0,.3); box-shadow:0 4px 16px rgba(0,0,0,.2);
    min-height:70px;
  }
  .opt-icon { font-size:1.4em; flex-shrink:0; }
  .opt-text { flex:1; }

  /* Options — with images */
  .q-options-grid.has-images .q-option {
    flex-direction:column; align-items:stretch; padding:.75rem; gap:.5rem; min-height:140px;
  }
  .q-options-grid.has-images .opt-icon { font-size:1.1em; }
  .opt-img {
    display:none; width:100%; max-height:130px; object-fit:contain;
    border-radius:8px; background:rgba(255,255,255,.1);
  }
  .q-options-grid.has-images .opt-img { display:block; }

  #q-answer-count { font-size:1.1rem; color:#aaa; flex-shrink:0; }

  /* ── RESULTS ── */
  #view-results {
    background:linear-gradient(135deg,#1a1a2e 0%,#0f3460 100%);
    justify-content:space-between; padding:2rem 3rem;
  }
  #res-q-text { font-size:clamp(1.4rem,3vw,2.2rem); font-weight:800; max-width:900px; }
  .res-bars { display:flex; align-items:flex-end; justify-content:center; gap:2rem; height:300px; width:100%; max-width:900px; }
  .res-bar-wrap { display:flex; flex-direction:column; align-items:center; gap:.4rem; flex:1; height:100%; justify-content:flex-end; }
  .res-label { font-size:1rem; font-weight:700; color:var(--gold); }
  .res-bar   { width:100%; border-radius:8px 8px 0 0; min-height:4px; transition:height .6s ease; }
  .res-count { font-size:1.6rem; font-weight:900; }
  .res-icon  { font-size:1.6rem; }
  .res-opt-text { font-size:.95rem; text-align:center; max-width:120px; }

  /* ── LEADERBOARD / FINISHED ── */
  #view-leaderboard, #view-finished {
    background:linear-gradient(135deg,#1a1a2e 0%,#2d6a4f55 100%);
    gap:1.5rem; justify-content:space-between; padding:2rem 3rem;
  }
  .lb-title { font-size:2.5rem; font-weight:900; color:var(--gold); }
  .podium { display:flex; align-items:flex-end; justify-content:center; gap:2rem; }
  .podium-slot { display:flex; flex-direction:column; align-items:center; gap:.4rem; width:200px; }
  .podium-slot.empty { opacity:0; }
  .podium-name  { font-size:1.3rem; font-weight:800; }
  .podium-score { font-size:1rem; color:var(--gold); }
  .podium-base  { width:100%; background:var(--green); border-radius:10px 10px 0 0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.25rem; }
  .podium-rank  { font-size:2.5rem; font-weight:900; }
  .podium-prize { font-size:.85rem; font-weight:700; text-align:center; padding:.2rem .5rem; }
  .podium-slot:nth-child(2) .podium-base { background:#c9b037; }
  .podium-slot:nth-child(2) .podium-name  { font-size:1.6rem; }
  .podium-slot:nth-child(2) .podium-score { font-size:1.2rem; color:#ffd700; }
  .lb-list   { width:100%; max-width:600px; }
  .list-row  { display:flex; align-items:center; gap:1rem; padding:.5rem 1rem; border-radius:8px; background:#ffffff10; margin-bottom:.35rem; }
  .list-rank  { font-size:1rem; font-weight:700; color:#aaa; width:2rem; }
  .list-name  { flex:1; font-size:1.1rem; font-weight:600; }
  .list-score { font-size:1rem; color:var(--gold); font-weight:700; }
  .confetti-hint { font-size:4rem; animation:bounce 1s infinite alternate; }
  @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-10px)} }
</style>
</head>
<body>

<!-- IDLE -->
<div id="view-idle" class="view">
  <h1>🎬 En place mon Loup</h1>
  <p>Quiz interactif — Place Limouloise</p>
</div>

<!-- WAITING -->
<div id="view-waiting" class="view">
  <h1>📱 Rejoins le quiz!</h1>
  <div id="qr-code"></div>
  <div id="join-url">chargement…</div>
  <p class="waiting-sub">ou scanne le code QR</p>
  <p class="waiting-sub"><span id="waiting-count">0</span> participant(s) connecté(s)</p>
</div>

<!-- QUESTION -->
<div id="view-question" class="view">
  <div class="q-header">
    <div id="q-timer-wrap"><div id="q-timer-bar"></div></div>
    <div id="q-timer">30</div>
  </div>
  <div id="q-image-wrap" style="display:none"><img id="q-image" src="" alt=""></div>
  <div id="q-text">Question…</div>
  <div id="q-options-grid" class="q-options-grid">
    <div class="q-option"><span class="opt-icon"></span><img class="opt-img" src="" alt=""><span class="opt-text"></span></div>
    <div class="q-option"><span class="opt-icon"></span><img class="opt-img" src="" alt=""><span class="opt-text"></span></div>
    <div class="q-option"><span class="opt-icon"></span><img class="opt-img" src="" alt=""><span class="opt-text"></span></div>
    <div class="q-option"><span class="opt-icon"></span><img class="opt-img" src="" alt=""><span class="opt-text"></span></div>
  </div>
  <div id="q-answer-count"></div>
</div>

<!-- RESULTS -->
<div id="view-results" class="view">
  <div id="res-q-text">Question…</div>
  <div class="res-bars">
    <div class="res-bar-wrap"><div class="res-label"></div><div class="res-bar"></div><div class="res-count"></div><div class="res-icon"></div><div class="res-opt-text"></div></div>
    <div class="res-bar-wrap"><div class="res-label"></div><div class="res-bar"></div><div class="res-count"></div><div class="res-icon"></div><div class="res-opt-text"></div></div>
    <div class="res-bar-wrap"><div class="res-label"></div><div class="res-bar"></div><div class="res-count"></div><div class="res-icon"></div><div class="res-opt-text"></div></div>
    <div class="res-bar-wrap"><div class="res-label"></div><div class="res-bar"></div><div class="res-count"></div><div class="res-icon"></div><div class="res-opt-text"></div></div>
  </div>
</div>

<!-- LEADERBOARD -->
<div id="view-leaderboard" class="view">
  <div class="lb-title">📊 Classement</div>
  <div class="podium" id="interim-podium"></div>
  <div class="lb-list" id="interim-list"></div>
</div>

<!-- FINISHED -->
<div id="view-finished" class="view">
  <div class="confetti-hint">🎉</div>
  <div class="lb-title">🏆 Résultats finaux!</div>
  <div class="podium" id="final-podium"></div>
  <div class="lb-list" id="final-list"></div>
  <p style="font-size:1rem;color:#aaa">Félicitations aux gagnant·e·s — Limoilou en vrac</p>
</div>

</body>
</html>
