<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quiz — En place mon Loup</title>
<script src="firebase-config.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update, push, get, set }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp(FIREBASE_CONFIG);
const db  = getDatabase(app);

let myId         = sessionStorage.getItem("quiz_id") || null;
let myName       = sessionStorage.getItem("quiz_name") || null;
let session      = {};
let questions    = {};
let participants = {};
let timerInterval = null;

// ── Views ─────────────────────────────────────────────────────────────────
const views = ["join","waiting","question","answered","results","leaderboard","finished","closed"];
function show(v) {
  views.forEach(id => {
    const el = document.getElementById("v-" + id);
    if (el) el.style.display = id === v ? "flex" : "none";
  });
}

// ── Live listeners ────────────────────────────────────────────────────────
onValue(ref(db, "questions"), snap => { questions = snap.val() || {}; });

onValue(ref(db, "participants"), snap => {
  participants = snap.val() || {};
  updateWaitingCount();
});

onValue(ref(db, "session"), snap => {
  session = snap.val() || {};
  syncState();
});

function updateWaitingCount() {
  const el = document.getElementById("waiting-count");
  if (el) el.textContent = Object.keys(participants).length;
}

function syncState() {
  if (!myId) return; // not joined yet

  const status = session.status;

  if (status === "idle") { show("closed"); return; }
  if (status === "finished") { showFinished(); return; }

  if (status === "waiting") { show("waiting"); updateWaitingCount(); return; }

  if (status === "question") {
    const me = participants[myId];
    const alreadyAnswered = me?.answers?.[session.currentQuestion] !== undefined;
    if (alreadyAnswered) {
      showAnsweredWait();
    } else {
      showQuestion();
    }
    return;
  }

  if (status === "results") { showResults(); return; }

  if (status === "leaderboard") { showLeaderboardView(false); return; }
}

// ── Join ──────────────────────────────────────────────────────────────────
document.getElementById("join-form").addEventListener("submit", async e => {
  e.preventDefault();
  const name  = document.getElementById("inp-name").value.trim();
  const email = document.getElementById("inp-email").value.trim();
  if (!name || !email) return;

  // Check quiz is open
  const snap = await get(ref(db, "session/status"));
  const status = snap.val();
  if (status === "idle" || status === "finished" || !status) {
    alert("Le quiz n'est pas encore ouvert. Attends le signal de l'animateur!"); return;
  }

  const newRef = push(ref(db, "participants"));
  myId = newRef.key;
  myName = name;
  sessionStorage.setItem("quiz_id", myId);
  sessionStorage.setItem("quiz_name", myName);

  await set(newRef, { name, email, score: 0, joinedAt: Date.now() });

  document.getElementById("player-name").textContent = name;
  document.getElementById("player-name-waiting").textContent = name;

  syncState();
});

// ── Question ──────────────────────────────────────────────────────────────
function showQuestion() {
  const q = questions[session.currentQuestion];
  if (!q) return;

  show("question");

  // Question image
  const qImgWrap = document.getElementById("q-img-wrap");
  const qImgEl   = document.getElementById("q-img");
  if (q.questionImage) {
    qImgEl.src = q.questionImage;
    qImgWrap.style.display = "block";
  } else {
    qImgWrap.style.display = "none";
  }

  document.getElementById("q-q-text").textContent = q.question;

  const colors = ["#e63946","#457b9d","#e9c46a","#2d6a4f"];
  const icons  = ["🔺","🔷","🟡","🟢"];

  const btns = document.querySelectorAll(".ans-btn");
  btns.forEach((btn, i) => {
    btn.style.background = colors[i];
    btn.querySelector(".ans-icon").textContent = icons[i];
    btn.querySelector(".ans-text").textContent = q.options[i];
    btn.disabled = false;
    btn.style.opacity = "1";
    btn.onclick = () => submitAnswer(i);

    // Option image
    const imgEl  = btn.querySelector(".ans-img");
    const imgUrl = q.optionImages?.[i];
    if (imgUrl) {
      imgEl.src = imgUrl;
      imgEl.style.display = "block";
      btn.classList.add("has-img");
    } else {
      imgEl.src = "";
      imgEl.style.display = "none";
      btn.classList.remove("has-img");
    }
  });

  // Timer countdown
  clearInterval(timerInterval);
  const timerEl = document.getElementById("q-timer-mobile");
  const timerBar = document.getElementById("q-timer-bar-mobile");
  const elapsed  = (Date.now() - session.questionStartedAt) / 1000;
  let remaining  = Math.max(0, q.timer - elapsed);

  function tick() {
    const r = Math.max(0, remaining);
    timerEl.textContent = Math.ceil(r);
    timerBar.style.width = (r / q.timer * 100) + "%";
    timerBar.style.background = r > q.timer * 0.4 ? "#40916c" : r > q.timer * 0.2 ? "#e9c46a" : "#e63946";
    if (r <= 0) clearInterval(timerInterval);
    remaining -= 0.1;
  }
  tick();
  timerInterval = setInterval(tick, 100);
}

async function submitAnswer(answerIndex) {
  const q = questions[session.currentQuestion];
  if (!q || !myId) return;

  const elapsed  = (Date.now() - session.questionStartedAt) / 1000;
  const timeLeft = Math.max(0, q.timer - elapsed);
  const points   = answerIndex === q.correct
    ? Math.round(1000 * (timeLeft / q.timer))
    : 0;

  // Disable buttons
  document.querySelectorAll(".ans-btn").forEach(b => {
    b.disabled = true;
    b.style.opacity = "0.5";
  });

  // Save answer
  const me = participants[myId] || {};
  const updates = {};
  updates[`participants/${myId}/answers/${session.currentQuestion}`] = {
    answer: answerIndex,
    points,
    answeredAt: Date.now()
  };
  updates[`participants/${myId}/score`] = (me.score || 0) + points;
  await update(ref(db), updates);

  showAnsweredWait(answerIndex === q.correct, points);
}

function showAnsweredWait(isCorrect, points) {
  const v = document.getElementById("v-answered");
  v.style.display = "flex";
  document.getElementById("v-question").style.display = "none";
  clearInterval(timerInterval);

  if (isCorrect !== undefined) {
    document.getElementById("ans-feedback").textContent = isCorrect ? "✅ Bonne réponse!" : "❌ Mauvaise réponse";
    document.getElementById("ans-points").textContent   = isCorrect ? `+${points} pts` : "";
    document.getElementById("ans-points").style.color   = isCorrect ? "#40916c" : "#e63946";
  } else {
    document.getElementById("ans-feedback").textContent = "⏳ Réponse enregistrée";
    document.getElementById("ans-points").textContent   = "";
  }
}

// ── Results ───────────────────────────────────────────────────────────────
function showResults() {
  show("results");
  clearInterval(timerInterval);

  const q  = questions[session.currentQuestion];
  const me = participants[myId];
  const myAnswer = me?.answers?.[session.currentQuestion];

  if (!q || !myAnswer) return;

  const isCorrect = myAnswer.answer === q.correct;
  document.getElementById("res-feedback").textContent    = isCorrect ? "✅ Bonne réponse!" : "❌ Mauvaise réponse";
  document.getElementById("res-correct-ans").textContent = `La bonne réponse : ${q.options[q.correct]}`;
  document.getElementById("res-pts-earned").textContent  = `+${myAnswer.points || 0} pts`;
  document.getElementById("res-total-score").textContent = `Score total : ${me.score || 0} pts`;

  // Mini classement
  const sorted = Object.entries(participants)
    .sort(([,a],[,b]) => (b.score||0) - (a.score||0));
  const myRank = sorted.findIndex(([id]) => id === myId) + 1;

  // Show top 5, always include current player if outside top 5
  let rows = sorted.slice(0, 5);
  if (myRank > 5) rows.push(sorted[myRank - 1]);

  document.getElementById("res-lb-list").innerHTML = rows.map(([id, p], i) => {
    const rank = sorted.findIndex(([rid]) => rid === id) + 1;
    const isMe = id === myId;
    return `<div class="res-lb-row ${isMe ? 'me' : ''}">
      <span class="res-lb-rk">${rank === myRank && myRank > 5 && i === rows.length - 1 ? '···' : rank}</span>
      <span class="res-lb-nm">${p.name}${isMe ? ' 👈' : ''}</span>
      <span class="res-lb-sc">${p.score || 0} pts</span>
    </div>`;
  }).join("");

  // Answer distribution chart
  const votes = [0, 0, 0, 0];
  Object.values(participants).forEach(p => {
    const ans = p.answers?.[session.currentQuestion]?.answer;
    if (ans !== undefined && ans >= 0 && ans <= 3) votes[ans]++;
  });
  const maxVotes = Math.max(...votes, 1);
  const chartColors = ["#e63946","#457b9d","#e9c46a","#2d6a4f"];
  const chartIcons  = ["🔺","🔷","🟡","🟢"];
  document.getElementById("res-chart").innerHTML = votes.map((v, i) => `
    <div class="res-bar-col">
      <div class="res-bar-count">${v}</div>
      <div class="res-bar-inner" style="height:${Math.round(v / maxVotes * 72)}px;background:${chartColors[i]};${i === q.correct ? 'outline:3px solid #fff;outline-offset:2px;' : 'opacity:.85'}"></div>
      <div class="res-bar-icon">${chartIcons[i]}</div>
    </div>
  `).join("");
}

// ── Leaderboard ───────────────────────────────────────────────────────────
function showLeaderboardView(final) {
  show(final ? "finished" : "leaderboard");
  clearInterval(timerInterval);

  const sorted = Object.entries(participants)
    .sort(([,a],[,b]) => (b.score||0) - (a.score||0));

  const myRank = sorted.findIndex(([id]) => id === myId) + 1;
  const total  = sorted.length;

  const rankId  = final ? "fin-rank"  : "lb-rank";
  const nameId  = final ? "fin-name"  : "lb-name";
  const scoreId = final ? "fin-score" : "lb-score";
  const subId   = final ? "fin-sub"   : "lb-sub";
  const listId  = final ? "fin-list"  : "lb-list";

  document.getElementById(rankId).textContent  = `#${myRank} / ${total}`;
  document.getElementById(nameId).textContent  = myName || "";
  document.getElementById(scoreId).textContent = `${(participants[myId]?.score)||0} pts`;

  if (final) {
    const prizes = [null,"🏅 Hoodie Limoilou en vrac","🥈 T-shirt Limoilou en vrac","🥉 Gourde Limoilou en vrac"];
    document.getElementById(subId).textContent = prizes[myRank] || "Merci d'avoir participé! 🎉";
  } else {
    document.getElementById(subId).textContent = myRank <= 3 ? "Tu es dans le podium! 🏆" : "";
  }

  document.getElementById(listId).innerHTML = sorted.slice(0, 10).map(([id, p], i) => `
    <div class="lb-row ${id === myId ? 'me' : ''}">
      <span class="lb-rk">${i+1}</span>
      <span class="lb-nm">${p.name}</span>
      <span class="lb-sc">${p.score||0} pts</span>
    </div>`).join("");
}

function showFinished() { showLeaderboardView(true); }

// ── Restore session ───────────────────────────────────────────────────────
if (myId && myName) {
  document.getElementById("player-name").textContent = myName;
  document.getElementById("player-name-waiting").textContent = myName;
  show("waiting"); // temporary until syncState fires
}
</script>

  .ans-waiting  { color: #aaa; font-size: 1rem; }
  .ans-waiting-dot { animation: pulse 1.2s infinite; display: inline-block; }

  /* ── RESULTS ── */
  #v-results { background: linear-gradient(135deg, var(--bg) 0%, #d8f3dc 100%); gap: .75rem; justify-content: flex-start; padding-top: 5rem; }
  #res-feedback    { font-size: 2rem; font-weight: 800; }
  #res-correct-ans { font-size: 1rem; color: var(--green); font-weight: 600; }
  #res-pts-earned  { font-size: 1.6rem; font-weight: 800; color: var(--green2); }
  #res-total-score { font-size: 1rem; color: var(--muted); }
