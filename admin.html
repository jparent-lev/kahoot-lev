<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Quiz En place mon Loup</title>
<script src="firebase-config.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, remove, onValue, update, get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

// ── Auth ──────────────────────────────────────────────────────────────────
const AUTH_KEY = "kahoot_admin_auth";

function isAuthenticated() {
  return localStorage.getItem(AUTH_KEY) === ADMIN_PASSWORD;
}

if (!isAuthenticated()) {
  // Show login screen, hide main content
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("app").style.display = "none";

  document.getElementById("login-form").addEventListener("submit", e => {
    e.preventDefault();
    const entered = document.getElementById("login-pwd").value;
    if (entered === ADMIN_PASSWORD) {
      localStorage.setItem(AUTH_KEY, ADMIN_PASSWORD);
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("app").style.display = "block";
      initApp();
    } else {
      document.getElementById("login-error").style.display = "block";
      document.getElementById("login-pwd").value = "";
      document.getElementById("login-pwd").focus();
    }
  });
} else {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
}

window.logout = function() {
  localStorage.removeItem(AUTH_KEY);
  location.reload();
};

function initApp() {

// ── Firebase init ─────────────────────────────────────────────────────────
const app     = initializeApp(FIREBASE_CONFIG);
const db      = getDatabase(app);
const storage = getStorage(app);

// ── State ─────────────────────────────────────────────────────────────────
const questionsRef   = ref(db, "questions");
const sessionRef     = ref(db, "session");
const participantsRef = ref(db, "participants");

let questions    = {};
let session      = {};
let participants = {};
let currentQuestionImage = null;
let currentOptionImages  = [null, null, null, null];
let timerInterval = null;

// ── Live listeners ────────────────────────────────────────────────────────
onValue(questionsRef,    snap => { questions    = snap.val() || {}; renderQuestions(); });
onValue(sessionRef,      snap => { session      = snap.val() || {}; renderSessionControls(); });
onValue(participantsRef, snap => { participants = snap.val() || {}; renderParticipants(); });

// ── Helpers ───────────────────────────────────────────────────────────────
function el(id) { return document.getElementById(id); }

function setPreview(imgEl, clearBtn, url) {
  if (url) {
    imgEl.src = url;
    imgEl.style.display = "block";
    clearBtn.style.display = "inline-flex";
  } else {
    imgEl.src = "";
    imgEl.style.display = "none";
    clearBtn.style.display = "none";
  }
}

async function uploadImg(file, path) {
  const r = sRef(storage, path);
  await uploadBytes(r, file);
  return getDownloadURL(r);
}

// ── Image preview callbacks (global) ─────────────────────────────────────
window.onImgChange = function(input, key, idx) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    if (key === "q") {
      setPreview(el("prev-q-img"), el("clear-q-img"), e.target.result);
    } else {
      setPreview(el(`prev-o${idx}-img`), el(`clear-o${idx}-img`), e.target.result);
    }
  };
  reader.readAsDataURL(file);
};

window.clearImg = function(key, idx) {
  if (key === "q") {
    el("form-q-img").value = "";
    currentQuestionImage = null;
    setPreview(el("prev-q-img"), el("clear-q-img"), null);
  } else {
    el(`form-o${idx}-img`).value = "";
    currentOptionImages[idx] = null;
    setPreview(el(`prev-o${idx}-img`), el(`clear-o${idx}-img`), null);
  }
};

// ── Render questions ──────────────────────────────────────────────────────
function renderQuestions() {
  const list   = el("question-list");
  const sorted = Object.entries(questions).sort(([,a],[,b]) => a.order - b.order);
  if (!sorted.length) { list.innerHTML = "<p class='empty'>Aucune question pour l'instant.</p>"; return; }

  list.innerHTML = sorted.map(([id, q], i) => `
    <div class="q-card">
      <div class="q-header">
        <span class="q-num">#${i+1}</span>
        <span class="q-timer-badge">${q.timer}s</span>
        <div class="q-actions">
          <button onclick="editQuestion('${id}')" class="btn-icon" title="Modifier">✏️</button>
          <button onclick="deleteQuestion('${id}')" class="btn-icon" title="Supprimer">🗑️</button>
          ${i > 0 ? `<button onclick="moveQuestion('${id}',-1)" class="btn-icon">⬆️</button>` : ""}
          ${i < sorted.length-1 ? `<button onclick="moveQuestion('${id}',1)" class="btn-icon">⬇️</button>` : ""}
        </div>
      </div>
      ${q.questionImage ? `<img src="${q.questionImage}" class="q-thumb" alt="">` : ""}
      <p class="q-text">${q.question}</p>
      <div class="q-options">
        ${q.options.map((opt, oi) => `
          <span class="opt ${oi === q.correct ? 'correct' : ''}">
            ${q.optionImages?.[oi] ? `<img src="${q.optionImages[oi]}" class="opt-thumb" alt="">` : ['🔺','🔷','🟡','🟢'][oi]}
            ${opt}
          </span>`).join("")}
      </div>
    </div>`).join("");
}

// ── Render session controls ───────────────────────────────────────────────
function renderSessionControls() {
  const status   = session.status || "idle";
  const sortedQ  = Object.entries(questions).sort(([,a],[,b]) => a.order - b.order);
  const currentIdx = sortedQ.findIndex(([id]) => id === session.currentQuestion);
  const totalQ   = sortedQ.length;

  const statusLabels = { idle:"En attente", waiting:"Salle d'attente", question:"Question en cours", results:"Résultats", leaderboard:"Classement", finished:"Terminé" };
  el("session-status").textContent  = statusLabels[status] || status;
  el("session-progress").textContent = (status === "question" || status === "results") ? `Question ${currentIdx+1} / ${totalQ}` : "";

  const btns  = el("session-btns");
  const pcount = Object.keys(participants).length;
  let html = "";

  if (status === "idle" || status === "finished") {
    html += `<button class="btn btn-green" onclick="startWaiting()">🎬 Ouvrir la salle d'attente</button>`;
    if (status === "finished") html += `<button class="btn btn-red" onclick="resetQuiz()">🔄 Réinitialiser</button>`;
  }
  if (status === "waiting") {
    html += `<p class="pcount">${pcount} participant(s)</p>`;
    if (totalQ > 0) html += `<button class="btn btn-green" onclick="startQuestion('${sortedQ[0][0]}')">▶ Lancer (${totalQ} questions)</button>`;
    else html += `<p class="warn">Ajoutez des questions d'abord.</p>`;
    html += `<button class="btn btn-red" onclick="resetQuiz()">✖ Annuler</button>`;
  }
  if (status === "results") {
    const nextIdx = currentIdx + 1;
    if (nextIdx < totalQ) html += `<button class="btn btn-green" onclick="startQuestion('${sortedQ[nextIdx][0]}')">▶ Question suivante</button>`;
    else html += `<button class="btn btn-green" onclick="showFinalLeaderboard()">🏆 Classement final</button>`;
    html += `<button class="btn btn-outline" onclick="showLeaderboard()">📊 Classement intermédiaire</button>`;
  }
  if (status === "leaderboard") {
    const nextIdx = currentIdx + 1;
    if (nextIdx < totalQ) html += `<button class="btn btn-green" onclick="startQuestion('${sortedQ[nextIdx][0]}')">▶ Prochaine question</button>`;
    else html += `<button class="btn btn-green" onclick="showFinalLeaderboard()">🏆 Classement final</button>`;
  }
  if (status === "question") {
    html += `<p class="pcount">⏱ Question en cours…</p>`;
    html += `<button class="btn btn-yellow" onclick="forceEndQuestion()">⏭ Terminer maintenant</button>`;
  }

  btns.innerHTML = html;
  window.sortedQ = sortedQ;
}

// ── Render participants ───────────────────────────────────────────────────
function renderParticipants() {
  const list   = el("participant-list");
  const sorted = Object.entries(participants).sort(([,a],[,b]) => (b.score||0) - (a.score||0));
  if (!sorted.length) { list.innerHTML = "<p class='empty'>Aucun participant pour l'instant.</p>"; return; }

  list.innerHTML = `
    <table>
      <thead><tr><th>#</th><th>Nom</th><th>Courriel</th><th>Score</th></tr></thead>
      <tbody>${sorted.map(([,p],i) => `<tr><td>${i+1}</td><td>${p.name}</td><td>${p.email}</td><td>${p.score||0}</td></tr>`).join("")}</tbody>
    </table>
    <button class="btn btn-outline" onclick="exportParticipants()" style="margin-top:1rem">⬇ Exporter CSV</button>`;
}

// ── Question CRUD ─────────────────────────────────────────────────────────
window.editQuestion = function(id) {
  const q = questions[id];
  el("form-id").value       = id;
  el("form-q").value        = q.question;
  [0,1,2,3].forEach(i => el(`form-o${i}`).value = q.options[i] || "");
  el("form-correct").value  = q.correct;
  el("form-timer").value    = q.timer;
  el("form-title").textContent = "Modifier la question";

  // Images
  currentQuestionImage = q.questionImage || null;
  setPreview(el("prev-q-img"), el("clear-q-img"), currentQuestionImage);
  currentOptionImages = q.optionImages ? [...q.optionImages] : [null,null,null,null];
  [0,1,2,3].forEach(i => setPreview(el(`prev-o${i}-img`), el(`clear-o${i}-img`), currentOptionImages[i]));

  el("question-form").scrollIntoView({ behavior: "smooth" });
};

window.deleteQuestion = async function(id) {
  if (!confirm("Supprimer cette question ?")) return;
  await remove(ref(db, `questions/${id}`));
};

window.moveQuestion = async function(id, dir) {
  const sorted = Object.entries(questions).sort(([,a],[,b]) => a.order - b.order);
  const idx    = sorted.findIndex(([qid]) => qid === id);
  const swap   = idx + dir;
  if (swap < 0 || swap >= sorted.length) return;
  const updates = {};
  updates[`questions/${sorted[idx][0]}/order`]  = sorted[swap][1].order;
  updates[`questions/${sorted[swap][0]}/order`] = sorted[idx][1].order;
  await update(ref(db), updates);
};

// ── Form submit ───────────────────────────────────────────────────────────
el("question-form").addEventListener("submit", async e => {
  e.preventDefault();

  const submitBtn = e.target.querySelector('[type=submit]');
  submitBtn.disabled    = true;
  submitBtn.textContent = "⏳ Enregistrement…";

  const id   = el("form-id").value;
  const qKey = id || push(questionsRef).key;

  try {
    // Upload question image if new file selected
    let qImg = currentQuestionImage;
    const qImgFile = el("form-q-img").files[0];
    if (qImgFile) qImg = await uploadImg(qImgFile, `questions/${qKey}/question`);

    // Upload option images if new files selected
    const optImgs = [...currentOptionImages];
    for (let i = 0; i < 4; i++) {
      const f = el(`form-o${i}-img`).files[0];
      if (f) optImgs[i] = await uploadImg(f, `questions/${qKey}/option_${i}`);
    }

    const options = [0,1,2,3].map(i => el(`form-o${i}`).value.trim());
    if (!el("form-q").value.trim() || options.some(o => !o)) {
      alert("Remplissez tous les champs de texte."); return;
    }

    const data = {
      question:      el("form-q").value.trim(),
      options,
      correct:       parseInt(el("form-correct").value),
      timer:         parseInt(el("form-timer").value),
      order:         id ? questions[id].order : Date.now(),
      questionImage: qImg || null,
      optionImages:  optImgs
    };

    if (id) await update(ref(db, `questions/${id}`), data);
    else    await set(ref(db, `questions/${qKey}`), data);

    resetForm();
  } catch (err) {
    alert("Erreur lors de l'enregistrement : " + err.message);
  } finally {
    submitBtn.disabled    = false;
    submitBtn.textContent = "💾 Enregistrer";
  }
});

function resetForm() {
  el("form-id").value = "";
  el("form-q").value  = "";
  [0,1,2,3].forEach(i => {
    el(`form-o${i}`).value = "";
    el(`form-o${i}-img`).value = "";
    setPreview(el(`prev-o${i}-img`), el(`clear-o${i}-img`), null);
  });
  el("form-q-img").value = "";
  setPreview(el("prev-q-img"), el("clear-q-img"), null);
  currentQuestionImage = null;
  currentOptionImages  = [null, null, null, null];
  el("form-correct").value     = "0";
  el("form-timer").value       = "30";
  el("form-title").textContent = "Ajouter une question";
}

el("btn-cancel-form").addEventListener("click", resetForm);

// ── Session controls ──────────────────────────────────────────────────────
window.startWaiting = async function() {
  await set(sessionRef, { status:"waiting", currentQuestion:null, questionStartedAt:null });
  if (confirm("Effacer les participants de la session précédente ?")) await remove(participantsRef);
};
window.startQuestion = async function(qid) {
  await update(sessionRef, { status:"question", currentQuestion:qid, questionStartedAt:Date.now() });
};
window.forceEndQuestion  = async function() { await update(sessionRef, { status:"results" }); };
window.showLeaderboard   = async function() { await update(sessionRef, { status:"leaderboard" }); };
window.showFinalLeaderboard = async function() { await update(sessionRef, { status:"finished" }); };
window.resetQuiz = async function() {
  if (!confirm("Réinitialiser complètement le quiz ?")) return;
  await set(sessionRef, { status:"idle", currentQuestion:null });
  await remove(participantsRef);
};

// ── Auto-advance timer ────────────────────────────────────────────────────
onValue(sessionRef, snap => {
  const s = snap.val() || {};
  clearInterval(timerInterval);
  if (s.status === "question" && s.currentQuestion && s.questionStartedAt) {
    const q = questions[s.currentQuestion];
    if (!q) return;
    timerInterval = setInterval(async () => {
      if ((Date.now() - s.questionStartedAt) / 1000 >= q.timer) {
        clearInterval(timerInterval);
        await update(sessionRef, { status:"results" });
      }
    }, 500);
  }
});

// ── Export CSV ────────────────────────────────────────────────────────────
window.exportParticipants = function() {
  const sorted = Object.entries(participants).sort(([,a],[,b]) => (b.score||0) - (a.score||0));
  const rows   = [["Rang","Nom","Courriel","Score"]];
  sorted.forEach(([,p],i) => rows.push([i+1, p.name, p.email, p.score||0]));
  const a = document.createElement("a");
  a.href     = "data:text/csv;charset=utf-8," + encodeURIComponent(rows.map(r=>r.join(",")).join("\n"));
  a.download = "participants-quiz.csv";
  a.click();
};

} // end initApp()

if (isAuthenticated()) initApp();
</script>

<body>

<!-- Login screen -->
<div id="login-screen" style="display:none">
  <div class="login-card">
    <div style="font-size:2.5rem;margin-bottom:.5rem">🎬</div>
    <h2>Quiz En place mon Loup</h2>
    <p>Panneau d'administration</p>
    <form id="login-form">
      <input type="password" id="login-pwd" placeholder="Mot de passe" autocomplete="current-password" required>
      <button type="submit" class="btn-login">Connexion</button>
      <p id="login-error">Mot de passe incorrect.</p>
    </form>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">

<header>
  <h1>🎬 Quiz En place mon Loup</h1>
  <span class="badge">ADMIN</span>
  <button class="btn-logout" onclick="logout()">Déconnexion</button>
</header>

<main>

  <!-- Session -->
  <div class="card">
    <h2>🎮 Contrôle du quiz</h2>
    <div class="status-bar">
      <span class="status-label" id="session-status">Chargement…</span>
      <span class="progress" id="session-progress"></span>
    </div>
    <div class="session-btns" id="session-btns"><span style="color:var(--muted)">Chargement…</span></div>
  </div>

  <!-- Participants -->
  <div class="card">
    <h2>👥 Participants</h2>
    <div id="participant-list"><p class="empty">Chargement…</p></div>
  </div>

  <!-- Questions -->
  <div class="card">
    <h2>❓ Questions du quiz</h2>
    <div id="question-list"><p class="empty">Chargement…</p></div>
  </div>

  <!-- Formulaire -->
  <div class="card">
    <h2 id="form-title">Ajouter une question</h2>
    <form id="question-form">
      <input type="hidden" id="form-id">

      <div class="form-grid">

        <!-- Question text -->
        <div class="form-group full">
          <label>Question</label>
          <input type="text" id="form-q" placeholder="Ex: Dans quel quartier se trouve la Place Limouloise?" required>
        </div>

        <!-- Question image -->
        <div class="form-group full">
          <label>Photo de la question (optionnel)</label>
          <div class="img-upload-row">
            <label class="btn-upload" for="form-q-img">📷 Choisir une image</label>
            <input type="file" id="form-q-img" accept="image/*" onchange="onImgChange(this,'q')">
            <button type="button" class="btn-clear-img" id="clear-q-img" onclick="clearImg('q')">✖ Retirer</button>
          </div>
          <img id="prev-q-img" class="img-preview" alt="Aperçu">
        </div>

        <!-- Options -->
        <div class="form-group full">
          <label>Réponses (entrez les 4 options)</label>
          <div class="options-grid">

            <div class="option-input">
              <span class="option-icon">🔺</span>
              <div class="option-fields">
                <input type="text" id="form-o0" placeholder="Option 1 (rouge)" required>
                <div class="img-upload-row-sm">
                  <label class="btn-upload-sm" for="form-o0-img">📷 Image</label>
                  <input type="file" id="form-o0-img" accept="image/*" onchange="onImgChange(this,'o',0)">
                  <button type="button" class="btn-clear-sm" id="clear-o0-img" onclick="clearImg('o',0)">✖</button>
                </div>
                <img id="prev-o0-img" class="img-preview-sm" alt="">
              </div>
            </div>

            <div class="option-input">
              <span class="option-icon">🔷</span>
              <div class="option-fields">
                <input type="text" id="form-o1" placeholder="Option 2 (bleu)" required>
                <div class="img-upload-row-sm">
                  <label class="btn-upload-sm" for="form-o1-img">📷 Image</label>
                  <input type="file" id="form-o1-img" accept="image/*" onchange="onImgChange(this,'o',1)">
                  <button type="button" class="btn-clear-sm" id="clear-o1-img" onclick="clearImg('o',1)">✖</button>
                </div>
                <img id="prev-o1-img" class="img-preview-sm" alt="">
              </div>
            </div>

            <div class="option-input">
              <span class="option-icon">🟡</span>
              <div class="option-fields">
                <input type="text" id="form-o2" placeholder="Option 3 (jaune)" required>
                <div class="img-upload-row-sm">
                  <label class="btn-upload-sm" for="form-o2-img">📷 Image</label>
                  <input type="file" id="form-o2-img" accept="image/*" onchange="onImgChange(this,'o',2)">
                  <button type="button" class="btn-clear-sm" id="clear-o2-img" onclick="clearImg('o',2)">✖</button>
                </div>
                <img id="prev-o2-img" class="img-preview-sm" alt="">
              </div>
            </div>

            <div class="option-input">
              <span class="option-icon">🟢</span>
              <div class="option-fields">
                <input type="text" id="form-o3" placeholder="Option 4 (vert)" required>
                <div class="img-upload-row-sm">
                  <label class="btn-upload-sm" for="form-o3-img">📷 Image</label>
                  <input type="file" id="form-o3-img" accept="image/*" onchange="onImgChange(this,'o',3)">
                  <button type="button" class="btn-clear-sm" id="clear-o3-img" onclick="clearImg('o',3)">✖</button>
                </div>
                <img id="prev-o3-img" class="img-preview-sm" alt="">
              </div>
            </div>

          </div>
        </div>

        <div class="form-group">
          <label>Bonne réponse</label>
          <select id="form-correct">
            <option value="0">🔺 Option 1</option>
            <option value="1">🔷 Option 2</option>
            <option value="2">🟡 Option 3</option>
            <option value="3">🟢 Option 4</option>
          </select>
        </div>

        <div class="form-group">
          <label>Durée (secondes)</label>
          <select id="form-timer">
            <option value="15">15 secondes</option>
            <option value="20">20 secondes</option>
            <option value="30" selected>30 secondes</option>
            <option value="45">45 secondes</option>
            <option value="60">60 secondes</option>
          </select>
        </div>

      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-green">💾 Enregistrer</button>
        <button type="button" id="btn-cancel-form" class="btn btn-outline">Annuler</button>
      </div>
    </form>
  </div>

</main>
</div><!-- end #app -->
</body>
</html>
