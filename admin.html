<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Quiz En place mon Loup</title>
<script src="firebase-config.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, remove, onValue, update, get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── Auth ──────────────────────────────────────────────────────────────────
const pwd = prompt("Mot de passe admin :");
if (pwd !== ADMIN_PASSWORD) {
  document.body.innerHTML = "<p style='padding:2rem;font-family:sans-serif'>Accès refusé.</p>";
  throw new Error("Unauthorized");
}

// ── Firebase init ─────────────────────────────────────────────────────────
const app = initializeApp(FIREBASE_CONFIG);
const db  = getDatabase(app);

// ── Helpers ───────────────────────────────────────────────────────────────
const questionsRef  = ref(db, "questions");
const sessionRef    = ref(db, "session");
const participantsRef = ref(db, "participants");

let questions = {};
let session   = {};
let participants = {};

// ── Live listeners ────────────────────────────────────────────────────────
onValue(questionsRef, snap => {
  questions = snap.val() || {};
  renderQuestions();
});

onValue(sessionRef, snap => {
  session = snap.val() || {};
  renderSessionControls();
});

onValue(participantsRef, snap => {
  participants = snap.val() || {};
  renderParticipants();
});

// ── UI helpers ────────────────────────────────────────────────────────────
function el(id) { return document.getElementById(id); }

function renderQuestions() {
  const list = el("question-list");
  const sorted = Object.entries(questions).sort(([,a],[,b]) => a.order - b.order);
  if (!sorted.length) {
    list.innerHTML = "<p class='empty'>Aucune question pour l'instant.</p>";
    return;
  }
  list.innerHTML = sorted.map(([id, q], i) => `
    <div class="q-card" id="qcard-${id}">
      <div class="q-header">
        <span class="q-num">#${i+1}</span>
        <span class="q-timer-badge">${q.timer}s</span>
        <div class="q-actions">
          <button onclick="editQuestion('${id}')" class="btn-icon" title="Modifier">✏️</button>
          <button onclick="deleteQuestion('${id}')" class="btn-icon" title="Supprimer">🗑️</button>
          ${i > 0 ? `<button onclick="moveQuestion('${id}', -1)" class="btn-icon" title="Monter">⬆️</button>` : ""}
          ${i < sorted.length-1 ? `<button onclick="moveQuestion('${id}', 1)" class="btn-icon" title="Descendre">⬇️</button>` : ""}
        </div>
      </div>
      <p class="q-text">${q.question}</p>
      <div class="q-options">
        ${q.options.map((opt, oi) => `
          <span class="opt ${oi === q.correct ? 'correct' : ''}">${['🔺','🔷','🟡','🟢'][oi]} ${opt}</span>
        `).join("")}
      </div>
    </div>
  `).join("");
}

function renderSessionControls() {
  const status = session.status || "idle";
  const sortedQ = Object.entries(questions).sort(([,a],[,b]) => a.order - b.order);
  const currentIdx = sortedQ.findIndex(([id]) => id === session.currentQuestion);
  const totalQ = sortedQ.length;

  const statusLabels = {
    idle: "En attente",
    waiting: "Salle d'attente",
    question: "Question en cours",
    results: "Résultats",
    leaderboard: "Classement",
    finished: "Terminé"
  };

  el("session-status").textContent = statusLabels[status] || status;
  el("session-progress").textContent = status === "question" || status === "results"
    ? `Question ${currentIdx+1} / ${totalQ}`
    : "";

  // Buttons logic
  const btns = el("session-btns");
  const pcount = Object.keys(participants).length;

  let html = "";

  if (status === "idle" || status === "finished") {
    html += `<button class="btn btn-green" onclick="startWaiting()">🎬 Ouvrir la salle d'attente</button>`;
    if (status === "finished") {
      html += `<button class="btn btn-red" onclick="resetQuiz()">🔄 Réinitialiser le quiz</button>`;
    }
  }

  if (status === "waiting") {
    html += `<p class="pcount">${pcount} participant(s) connecté(s)</p>`;
    if (totalQ > 0) {
      html += `<button class="btn btn-green" onclick="startQuestion(sortedQ[0][0])">▶ Lancer le quiz (${totalQ} questions)</button>`;
    } else {
      html += `<p class="warn">Ajoutez des questions avant de lancer le quiz.</p>`;
    }
    html += `<button class="btn btn-red" onclick="resetQuiz()">✖ Annuler</button>`;
  }

  if (status === "results") {
    const nextIdx = currentIdx + 1;
    if (nextIdx < totalQ) {
      html += `<button class="btn btn-green" onclick="startQuestion('${sortedQ[nextIdx][0]}')">▶ Question suivante</button>`;
    } else {
      html += `<button class="btn btn-green" onclick="showFinalLeaderboard()">🏆 Afficher le classement final</button>`;
    }
    html += `<button class="btn btn-outline" onclick="showLeaderboard()">📊 Classement intermédiaire</button>`;
  }

  if (status === "leaderboard") {
    const nextIdx = currentIdx + 1;
    if (nextIdx < totalQ) {
      html += `<button class="btn btn-green" onclick="startQuestion('${sortedQ[nextIdx][0]}')">▶ Prochaine question</button>`;
    } else {
      html += `<button class="btn btn-green" onclick="showFinalLeaderboard()">🏆 Classement final</button>`;
    }
  }

  if (status === "question") {
    html += `<p class="pcount">⏱ Question en cours...</p>`;
    html += `<button class="btn btn-yellow" onclick="forceEndQuestion()">⏭ Terminer maintenant</button>`;
  }

  btns.innerHTML = html;

  // make sortedQ accessible
  window.sortedQ = sortedQ;
}

function renderParticipants() {
  const list = el("participant-list");
  const sorted = Object.entries(participants)
    .sort(([,a],[,b]) => (b.score||0) - (a.score||0));
  if (!sorted.length) {
    list.innerHTML = "<p class='empty'>Aucun participant pour l'instant.</p>";
    return;
  }
  list.innerHTML = `
    <table>
      <thead><tr><th>#</th><th>Nom</th><th>Courriel</th><th>Score</th></tr></thead>
      <tbody>${sorted.map(([,p], i) => `
        <tr>
          <td>${i+1}</td>
          <td>${p.name}</td>
          <td>${p.email}</td>
          <td>${p.score||0}</td>
        </tr>`).join("")}
      </tbody>
    </table>
    <button class="btn btn-outline" onclick="exportParticipants()" style="margin-top:1rem">
      ⬇ Exporter CSV
    </button>
  `;
}

// ── Question CRUD ─────────────────────────────────────────────────────────
window.editQuestion = function(id) {
  const q = questions[id];
  el("form-id").value    = id;
  el("form-q").value     = q.question;
  el("form-o0").value    = q.options[0];
  el("form-o1").value    = q.options[1];
  el("form-o2").value    = q.options[2];
  el("form-o3").value    = q.options[3];
  el("form-correct").value = q.correct;
  el("form-timer").value = q.timer;
  el("form-title").textContent = "Modifier la question";
  el("question-form").scrollIntoView({behavior:"smooth"});
};

window.deleteQuestion = async function(id) {
  if (!confirm("Supprimer cette question ?")) return;
  await remove(ref(db, `questions/${id}`));
};

window.moveQuestion = async function(id, dir) {
  const sorted = Object.entries(questions).sort(([,a],[,b]) => a.order - b.order);
  const idx = sorted.findIndex(([qid]) => qid === id);
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= sorted.length) return;

  const updates = {};
  updates[`questions/${sorted[idx][0]}/order`]    = sorted[swapIdx][1].order;
  updates[`questions/${sorted[swapIdx][0]}/order`] = sorted[idx][1].order;
  await update(ref(db), updates);
};

el("question-form").addEventListener("submit", async e => {
  e.preventDefault();
  const id      = el("form-id").value;
  const options = [0,1,2,3].map(i => el(`form-o${i}`).value.trim());
  const data = {
    question: el("form-q").value.trim(),
    options,
    correct:  parseInt(el("form-correct").value),
    timer:    parseInt(el("form-timer").value),
    order:    id ? questions[id].order : Date.now()
  };

  if (!data.question || options.some(o => !o)) {
    alert("Remplissez tous les champs."); return;
  }

  if (id) {
    await update(ref(db, `questions/${id}`), data);
  } else {
    await push(questionsRef, data);
  }

  resetForm();
});

function resetForm() {
  el("form-id").value = "";
  el("form-q").value  = "";
  [0,1,2,3].forEach(i => el(`form-o${i}`).value = "");
  el("form-correct").value = "0";
  el("form-timer").value   = "30";
  el("form-title").textContent = "Ajouter une question";
}

el("btn-cancel-form").addEventListener("click", resetForm);

// ── Session controls ──────────────────────────────────────────────────────
window.startWaiting = async function() {
  await set(sessionRef, { status: "waiting", currentQuestion: null, questionStartedAt: null });
  // Clear previous participants
  if (confirm("Effacer les participants de la session précédente ?")) {
    await remove(participantsRef);
  }
};

window.startQuestion = async function(qid) {
  await update(sessionRef, {
    status: "question",
    currentQuestion: qid,
    questionStartedAt: Date.now()
  });
};

window.forceEndQuestion = async function() {
  await update(sessionRef, { status: "results" });
};

window.showLeaderboard = async function() {
  await update(sessionRef, { status: "leaderboard" });
};

window.showFinalLeaderboard = async function() {
  await update(sessionRef, { status: "finished" });
};

window.resetQuiz = async function() {
  if (!confirm("Réinitialiser complètement le quiz ?")) return;
  await set(sessionRef, { status: "idle", currentQuestion: null });
  await remove(participantsRef);
};

// ── Auto-advance timer ────────────────────────────────────────────────────
let timerInterval = null;

onValue(sessionRef, snap => {
  const s = snap.val() || {};
  clearInterval(timerInterval);

  if (s.status === "question" && s.currentQuestion && s.questionStartedAt) {
    const q = questions[s.currentQuestion];
    if (!q) return;

    timerInterval = setInterval(async () => {
      const elapsed = (Date.now() - s.questionStartedAt) / 1000;
      if (elapsed >= q.timer) {
        clearInterval(timerInterval);
        await update(sessionRef, { status: "results" });
      }
    }, 500);
  }
});

// ── Export CSV ────────────────────────────────────────────────────────────
window.exportParticipants = function() {
  const sorted = Object.entries(participants)
    .sort(([,a],[,b]) => (b.score||0) - (a.score||0));
  const rows = [["Rang","Nom","Courriel","Score"]];
  sorted.forEach(([,p], i) => rows.push([i+1, p.name, p.email, p.score||0]));
  const csv = rows.map(r => r.join(",")).join("\n");
  const a = document.createElement("a");
  a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
  a.download = "participants-quiz.csv";
  a.click();
};
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:  #2d6a4f;
    --green2: #40916c;
    --gold:   #e9c46a;
    --red:    #c1121f;
    --yellow: #f4a261;
    --bg:     #f8f5f0;
    --card:   #ffffff;
    --text:   #1a1a2e;
    --muted:  #666;
    --border: #e0ddd7;
  }

  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

  header {
    background: var(--green);
    color: white;
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  header h1 { font-size: 1.3rem; font-weight: 700; }
  header .badge { background: var(--gold); color: var(--text); padding: .2rem .6rem; border-radius: 20px; font-size: .8rem; font-weight: 700; }

  main { max-width: 960px; margin: 2rem auto; padding: 0 1.5rem; display: grid; gap: 2rem; }

  .card {
    background: var(--card);
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,.07);
    padding: 1.5rem;
  }
  .card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; border-bottom: 2px solid var(--border); padding-bottom: .5rem; }

  /* Session controls */
  .status-bar { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
  .status-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--muted); }
  .status-label { font-weight: 600; }
  .progress { color: var(--muted); font-size: .9rem; }

  .session-btns { display: flex; flex-wrap: wrap; gap: .75rem; margin-top: 1rem; align-items: center; }
  .pcount { color: var(--green2); font-weight: 600; }
  .warn { color: var(--red); font-size: .9rem; }

  .btn { padding: .6rem 1.2rem; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; font-size: .95rem; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-green  { background: var(--green2); color: white; }
  .btn-red    { background: var(--red); color: white; }
  .btn-yellow { background: var(--yellow); color: var(--text); }
  .btn-outline { background: transparent; border: 2px solid var(--green2); color: var(--green2); }

  /* Form */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media(max-width:600px) { .form-grid { grid-template-columns: 1fr; } }

  .form-group { display: flex; flex-direction: column; gap: .35rem; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: .85rem; font-weight: 600; color: var(--muted); }

  input, select {
    padding: .55rem .75rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: .95rem;
    font-family: inherit;
    background: var(--bg);
    transition: border-color .15s;
  }
  input:focus, select:focus { outline: none; border-color: var(--green2); }

  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
  @media(max-width:600px) { .options-grid { grid-template-columns: 1fr; } }

  .option-input { display: flex; align-items: center; gap: .5rem; }
  .option-icon  { font-size: 1.1rem; flex-shrink: 0; }

  .form-actions { display: flex; gap: .75rem; margin-top: 1.25rem; }

  /* Question list */
  .q-card {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    margin-bottom: .75rem;
    background: var(--bg);
  }
  .q-header { display: flex; align-items: center; gap: .5rem; margin-bottom: .5rem; }
  .q-num { font-weight: 700; color: var(--green); }
  .q-timer-badge { background: var(--green); color: white; font-size: .75rem; padding: .15rem .5rem; border-radius: 20px; }
  .q-actions { margin-left: auto; display: flex; gap: .25rem; }
  .btn-icon { background: none; border: none; cursor: pointer; font-size: 1rem; padding: .2rem .3rem; border-radius: 4px; }
  .btn-icon:hover { background: var(--border); }
  .q-text { font-weight: 600; margin-bottom: .5rem; }
  .q-options { display: flex; flex-wrap: wrap; gap: .4rem; }
  .opt { padding: .2rem .6rem; border-radius: 6px; font-size: .85rem; background: var(--border); }
  .opt.correct { background: #d8f3dc; color: var(--green); font-weight: 700; border: 1.5px solid var(--green2); }
  .empty { color: var(--muted); font-style: italic; }

  /* Participants table */
  table { width: 100%; border-collapse: collapse; font-size: .9rem; }
  th, td { text-align: left; padding: .5rem .75rem; border-bottom: 1px solid var(--border); }
  th { font-weight: 700; color: var(--muted); font-size: .8rem; text-transform: uppercase; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }
</style>
</head>
<body>

<header>
  <div>
    <h1>🎬 Quiz En place mon Loup</h1>
  </div>
  <span class="badge">ADMIN</span>
</header>

<main>

  <!-- Contrôles session -->
  <div class="card">
    <h2>🎮 Contrôle du quiz</h2>
    <div class="status-bar">
      <div class="status-dot"></div>
      <span class="status-label" id="session-status">Chargement…</span>
      <span class="progress" id="session-progress"></span>
    </div>
    <div class="session-btns" id="session-btns">
      <span style="color:var(--muted)">Chargement…</span>
    </div>
  </div>

  <!-- Participants -->
  <div class="card">
    <h2>👥 Participants</h2>
    <div id="participant-list"><p class="empty">Chargement…</p></div>
  </div>

  <!-- Questions -->
  <div class="card">
    <h2>❓ Questions du quiz</h2>
    <div id="question-list"><p class="empty">Chargement…</p></div>
  </div>

  <!-- Formulaire question -->
  <div class="card" id="question-form-card">
    <h2 id="form-title">Ajouter une question</h2>
    <form id="question-form">
      <input type="hidden" id="form-id">

      <div class="form-grid">
        <div class="form-group full">
          <label>Question</label>
          <input type="text" id="form-q" placeholder="Ex: Dans quel quartier se trouve la Place Limouloise?" required>
        </div>

        <div class="form-group full">
          <label>Réponses (entrez les 4 options)</label>
          <div class="options-grid">
            <div class="option-input">
              <span class="option-icon">🔺</span>
              <input type="text" id="form-o0" placeholder="Option 1 (rouge)" required>
            </div>
            <div class="option-input">
              <span class="option-icon">🔷</span>
              <input type="text" id="form-o1" placeholder="Option 2 (bleu)" required>
            </div>
            <div class="option-input">
              <span class="option-icon">🟡</span>
              <input type="text" id="form-o2" placeholder="Option 3 (jaune)" required>
            </div>
            <div class="option-input">
              <span class="option-icon">🟢</span>
              <input type="text" id="form-o3" placeholder="Option 4 (vert)" required>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Bonne réponse</label>
          <select id="form-correct">
            <option value="0">🔺 Option 1</option>
            <option value="1">🔷 Option 2</option>
            <option value="2">🟡 Option 3</option>
            <option value="3">🟢 Option 4</option>
          </select>
        </div>

        <div class="form-group">
          <label>Durée (secondes)</label>
          <select id="form-timer">
            <option value="15">15 secondes</option>
            <option value="20">20 secondes</option>
            <option value="30" selected>30 secondes</option>
            <option value="45">45 secondes</option>
            <option value="60">60 secondes</option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-green">💾 Enregistrer</button>
        <button type="button" id="btn-cancel-form" class="btn btn-outline">Annuler</button>
      </div>
    </form>
  </div>

</main>
</body>
</html>
